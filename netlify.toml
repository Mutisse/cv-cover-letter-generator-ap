[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Configuração para rotas do React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers para cache
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"